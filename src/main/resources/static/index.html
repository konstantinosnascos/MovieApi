<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Movie Watchlist</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 40px; max-width: 800px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #6f42c1; color: white; }
        .form-container { background: #f8f9fa; padding: 20px; border-radius: 8px; border-left: 5px solid #6f42c1; }
        input, select { padding: 10px; margin-right: 10px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 15px; background: #28a745; color: white; border: none; cursor: pointer; border-radius: 4px;}
        .delete-btn { background: #dc3545; padding: 5px 10px; }
    </style>
</head>
<body>

<h2>🍿 My Movie Watchlist</h2>

<div class="form-container">
    <h3>Add to Watchlist</h3>
    <div>
        <input type="text" id="title" placeholder="Movie Title" required>
        <input type="text" id="director" placeholder="Director" required>
        <select id="status">
            <option value="PLAN_TO_WATCH">Plan to Watch</option>
            <option value="WATCHED">Watched</option>
        </select>
        <button onclick="addMovie()">Add Movie</button>
    </div>
    <p id="message"></p>
</div>

<table>
    <thead>
    <tr><th>Title</th><th>Director</th><th>Status</th><th>Actions</th></tr>
    </thead>
    <tbody id="movieTableBody"></tbody>
</table>

<div>
    <h3>Login</h3>
    <input id="username" placeholder="username">
    <input id="password" placeholder="password" type="password">
    <button onclick="login()">Login</button>
</div>

<script>
    let token = localStorage.getItem("token");
    const apiUrl = '/api/v1/movies';

    async function login() {
        const res = await fetch('/api/v1/auth/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                username: document.getElementById('username').value,
                password: document.getElementById('password').value
            })
        });

        const data = await res.json();

        token = typeof data === "string" ? data : data.token;
        localStorage.setItem("token", token);

        alert("Logged in!");
        fetchMovies();
    }

    async function fetchMovies() {
        if (!token) return;

        const response = await fetch(apiUrl, {
            headers: {
                'Authorization': 'Bearer ' + token
            }
        });

        const movies = await response.json();
        const tableBody = document.getElementById('movieTableBody');
        tableBody.innerHTML = '';

        movies.forEach(movie => {
            tableBody.innerHTML += `
<tr>
<td><strong>${movie.title}</strong></td>
<td>${movie.director}</td>
<td>${movie.status.replace(/_/g, ' ')}</td>
<td>
<button class="delete-btn" onclick="deleteMovie(${movie.id})">Remove</button>

${!movie.isLoaned
                ? `<button onclick="loanMovie(${movie.id})">Loan</button>`
                : `<span>Loaned Out</span>
       <button onclick="returnMovie(${movie.id})">Return</button>`
            }
</td>
</tr>`;
        });
    }

    async function addMovie() {
        const newMovie = {
            title: document.getElementById('title').value,
            director: document.getElementById('director').value,
            status: document.getElementById('status').value
        };

        const response = await fetch(apiUrl, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + token
            },
            body: JSON.stringify(newMovie)
        });

        const msgEl = document.getElementById('message');

        if (response.ok) {
            msgEl.innerText = "Movie added successfully!";
            msgEl.style.color = "green";
            fetchMovies();
        } else {
            msgEl.innerText = "Error adding movie.";
            msgEl.style.color = "red";
        }
    }

    async function deleteMovie(id) {
        await fetch(`${apiUrl}/${id}`, {
            method: 'DELETE',
            headers: {
                'Authorization': 'Bearer ' + token
            }
        });

        fetchMovies();
    }

    async function loanMovie(id) {
        const borrower = prompt("Enter borrower name:");
        if (!borrower) return;

        const response = await fetch(
            `/api/v1/loans/${id}?borrowerName=${borrower}`,
            {
                method: 'POST',
                headers: {
                    'Authorization': 'Bearer ' + token
                }
            }
        );

        if (response.status === 409) {
            alert("Movie already loaned!");
        }

        fetchMovies();
    }

    async function returnMovie(movieId) {
        const res1 = await fetch(`/api/v1/loans/${movieId}/active`, {
            headers: {
                'Authorization': 'Bearer ' + token
            }
        });

        const loan = await res1.json();

        const res2 = await fetch(`/api/v1/loans/${loan.loanId}/return`, {
            method: 'PUT',
            headers: {
                'Authorization': 'Bearer ' + token
            }
        });

        if (!res2.ok) {
            alert("Could not return movie");
        }

        fetchMovies();
    }

    fetchMovies();
</script>
</body>
</html>
