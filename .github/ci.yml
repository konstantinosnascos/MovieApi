name: CI Pipeline
on:
  push:
    branches: ["main"]
    pull_request:
      branches: ["main"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  jobs:
    build:
      runs-on: windows-latest
      steps:
        - name : Checkout code
          uses : actions/checkout@v4

        - name : Set up JDK 21
          uses : actions/setup-java@v4
          with :
              java-version : '21'
              distribution : 'temurin'

        - name : Build with Maven
          run : mvn clean verify
